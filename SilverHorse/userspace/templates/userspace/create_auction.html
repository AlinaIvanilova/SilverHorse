{% extends 'userspace/base.html' %}

{% block content %}
<h1>Виставити коня на аукціон</h1>
<form method="post">
    {% csrf_token %}
    <label for="horse">Оберіть коня:</label>
    <select name="horse" required>
        {% for horse in user_horses %}
            <option value="{{ horse.id }}">{{ horse.name }} ({{ horse.breed }})</option>
        {% endfor %}
    </select>

    <label for="duration">Тривалість (хвилин):</label>
    <select name="duration" required>
        <option value="5">5 хв</option>
        <option value="15">15 хв</option>
        <option value="30">30 хв</option>
        <option value="60">1 год</option>
    </select>

    <label for="starting_price">Початкова ціна (Срібні Підкови):</label>
    <input type="number" name="starting_price" min="1" required>

    <button type="submit">Створити аукціон</button>
</form>
{% endblock %}
