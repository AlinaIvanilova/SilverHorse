{% load static %}

<!-- 🌿 Фіксований верхній хедер -->
<header class="top-bar">
    <div class="logo-with-icon">
        <a href="{% url 'dashboard' %}">
            <img src="{% static 'userspace/my-icon.png' %}" alt="Іконка" class="logo-icon">
            Silver Horse
        </a>
    </div>

    {% if user.is_authenticated %}
    <div class="currencies">
        <!-- 💰 Срібні Підкови -->
        <a href="{% url 'subscription_page' %}" class="currency-item-link">
            <div class="currency-item">
                <img src="{% static 'userspace/Silver_Horseshoe.png' %}" alt="Срібні Підкови" class="currency-icon">
                <span class="tooltip-text">Срібні Підкови</span>
                <span class="currency-value">{{ user_horseshoes }}</span>
            </div>
        </a>

        <span class="divider">|</span>

        <!-- 🪽 Срібні Пір'я -->
        <a href="{% url 'subscription_page' %}" class="currency-item-link">
            <div class="currency-item">
                <img src="{% static 'userspace/silver_feather.png' %}" alt="Срібні Пір'я" class="currency-icon">
                <span class="tooltip-text">Срібні Пір'я</span>
                <span class="currency-value">{{ user_silver_wings }}</span>
            </div>
        </a>
    </div>
    {% endif %}

    <div class="top-buttons">
        <a href="{% url 'messages_page' %}" class="message-btn">
            <img src="{% static 'userspace/message-icon.png' %}" alt="Повідомлення" title="Повідомлення">
        </a>

        <div class="profile-menu">
            <input type="checkbox" id="menu-toggle">
            <label for="menu-toggle" class="profile-icon">
                <img src="{% static 'userspace/avatar.png' %}" alt="Профіль">
            </label>
            <div class="dropdown">
                <a href="{% url 'profile_page' %}">👤 Профіль</a>
                <a href="{% url 'subscription_page' %}">💎 Підписка</a>
                <a href="{% url 'account_page' %}">⚙️ Обліковий запис</a>
                <a href="{% url 'language_page' %}">🌍 Мова</a>
                <a href="{% url 'logout' %}">🚪 Вийти</a>
            </div>
        </div>
    </div>
</header>
