{% extends 'userspace/base.html' %}
{% load static %}

{% block content %}
<div class="sell-container">
    <h1><i class="fas fa-coins"></i> Продати коня {{ horse.name }}</h1>

    <div class="horse-summary">
        <img src="{{ horse.get_photo_url }}" alt="{{ horse.name }}" style="width: 150px; border-radius: 10px;">
        <div>
            <p><strong>Вік:</strong> {{ horse.get_age_display }}</p>
            <p><strong>Порода:</strong> {{ horse.breed }}</p>
            <p><strong>Стать:</strong> {{ horse.get_gender_display }}</p>
        </div>
    </div>

    <form method="post" class="sell-form" id="sellForm">
        {% csrf_token %}

        <div class="form-group">
            <label>Тип продажу:</label>
            <div class="radio-group">
                <label>
                    <input type="radio" name="sale_type" value="market" checked>
                    <i class="fas fa-store"></i> Ринок (миттєвий продаж за фіксованою ціною)
                </label>
                <label>
                    <input type="radio" name="sale_type" value="auction">
                    <i class="fas fa-gavel"></i> Аукціон (торги, ціна зростає)
                </label>
            </div>
        </div>

        <!-- Блок для РИНКУ (ціна + валюта) -->
        <div id="marketFields">
            <div class="form-group">
                <label for="market_price"><i class="fas fa-coins"></i> Ціна:</label>
                <input type="number" name="market_price" id="market_price" min="1" required class="form-control">
            </div>
            <div class="form-group">
                <label for="market_currency"><i class="fas fa-exchange-alt"></i> Валюта:</label>
                <select name="market_currency" id="market_currency" class="form-control">
                    <option value="horseshoes">Срібні підкови</option>
                    <option value="silver_wings">Срібні пір'їни</option>
                </select>
            </div>
        </div>

        <!-- Блок для АУКЦІОНУ (стартова ставка + валюта) -->
        <div id="auctionFields" style="display: none;">
            <div class="form-group">
                <label for="auction_price"><i class="fas fa-gavel"></i> Стартова ставка:</label>
                <input type="number" name="auction_price" id="auction_price" min="1" class="form-control">
            </div>
            <div class="form-group">
                <label for="auction_currency"><i class="fas fa-exchange-alt"></i> Валюта:</label>
                <select name="auction_currency" id="auction_currency" class="form-control">
                    <option value="horseshoes">Срібні підкови</option>
                    <option value="silver_wings">Срібні пір'їни</option>
                </select>
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-check"></i> Виставити на продаж
            </button>
            <a href="{% url 'horse_detail' horse.id %}" class="btn btn-secondary">
                <i class="fas fa-times"></i> Скасувати
            </a>
        </div>
    </form>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const marketRadio = document.querySelector('input[value="market"]');
        const auctionRadio = document.querySelector('input[value="auction"]');
        const marketFields = document.getElementById('marketFields');
        const auctionFields = document.getElementById('auctionFields');

        const marketPrice = document.getElementById('market_price');
        const marketCurrency = document.getElementById('market_currency');
        const auctionPrice = document.getElementById('auction_price');
        const auctionCurrency = document.getElementById('auction_currency');

        function toggleForms() {
            if (marketRadio.checked) {
                marketFields.style.display = 'block';
                auctionFields.style.display = 'none';
                marketPrice.required = true;
                auctionPrice.required = false;
                marketCurrency.disabled = false;
                auctionCurrency.disabled = true;
            } else {
                marketFields.style.display = 'none';
                auctionFields.style.display = 'block';
                marketPrice.required = false;
                auctionPrice.required = true;
                marketCurrency.disabled = true;
                auctionCurrency.disabled = false;
            }
        }

        marketRadio.addEventListener('change', toggleForms);
        auctionRadio.addEventListener('change', toggleForms);
        toggleForms();

        // Перед відправкою форми об'єднуємо дані в поля price та currency
        const form = document.getElementById('sellForm');
        form.addEventListener('submit', function(e) {
            let priceInput = document.createElement('input');
            let currencyInput = document.createElement('input');
            priceInput.type = 'hidden';
            priceInput.name = 'price';
            currencyInput.type = 'hidden';
            currencyInput.name = 'currency';

            if (marketRadio.checked) {
                priceInput.value = marketPrice.value;
                currencyInput.value = marketCurrency.value;
                // Видаляємо можливі старі поля тривалості (якщо були)
                document.querySelectorAll('input[name="duration_hours"]').forEach(el => el.remove());
            } else {
                priceInput.value = auctionPrice.value;
                currencyInput.value = auctionCurrency.value;
                // Додаємо тривалість (за замовчуванням 48 годин)
                let durInput = document.createElement('input');
                durInput.type = 'hidden';
                durInput.name = 'duration_hours';
                durInput.value = '48';
                form.appendChild(durInput);
            }
            form.appendChild(priceInput);
            form.appendChild(currencyInput);
        });
    });
</script>
{% endblock %}
