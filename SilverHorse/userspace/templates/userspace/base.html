{% load static %}
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Silver Horse{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'userspace/dashboard.css' %}">
</head>
<body>

    <!-- Фіксований верхній хедер -->
    <header class="top-bar">
        <div class="logo-with-icon">
            <a href="{% url 'dashboard' %}">
                <img src="{% static 'userspace/my-icon.png' %}" alt="Іконка" class="logo-icon">
                Silver Horse
            </a>
        </div>

        <div class="top-buttons">
            <a href="{% url 'messages' %}" class="message-btn">
                <img src="{% static 'userspace/message-icon.png' %}" alt="Повідомлення" title="Повідомлення">
            </a>

            <div class="profile-menu">
                <input type="checkbox" id="menu-toggle">
                <label for="menu-toggle" class="profile-icon">
                    <img src="{% static 'userspace/avatar.png' %}" alt="Профіль">
                </label>
                <div class="dropdown">
                    <a href="#">👤 Профіль</a>
                    <a href="#">💎 Підписка</a>
                    <a href="#">⚙️ Обліковий запис</a>
                    <a href="#">🌍 Мова</a>
                    <a href="{% url 'logout' %}">🚪 Вийти</a>
                </div>
            </div>
        </div>
    </header>

    <!-- Фіксований підхедер з навігацією -->
    <nav class="sub-header">
        <ul>
            <li><a href="#">Конярство</a></li>
            <li><a href="#">Кінноспортивний комплекс</a></li>
            <li><a href="#">Торгівля</a></li>
        </ul>
    </nav>

    <!-- Основний контент -->
    <main class="main-content">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Підключення футера -->
    {% include 'userspace/footer.html' %}

    <!-- Скрипт для проявлення футера при прокручуванні -->
    <script>
        const footer = document.querySelector('.site-footer');

        window.addEventListener('scroll', () => {
            if (window.pageYOffset > 100) {
                footer.classList.add('show-footer');
            } else {
                footer.classList.remove('show-footer');
            }
        });
    </script>

</body>
</html>
