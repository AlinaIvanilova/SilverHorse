{% load static %}
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Silver Horse{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'userspace/dashboard.css' %}">
</head>
<body>

    <!-- Фіксований верхній хедер -->
    <header class="top-bar">
        <!-- Лого з іконкою -->
        <div class="logo-with-icon">
            <a href="{% url 'dashboard' %}">
                <img src="{% static 'userspace/my-icon.png' %}" alt="Іконка" class="logo-icon">
                Silver Horse
            </a>
        </div>

        <div class="top-buttons">
            <!-- Повідомлення -->
            <a href="{% url 'messages' %}" class="message-btn">
                <img src="{% static 'userspace/message-icon.png' %}" alt="Повідомлення" title="Повідомлення">
            </a>

            <!-- Профіль -->
            <div class="profile-menu">
                <input type="checkbox" id="menu-toggle">
                <label for="menu-toggle" class="profile-icon">
                    <img src="{% static 'userspace/avatar.png' %}" alt="Профіль">
                </label>
                <div class="dropdown">
                    <a href="#">👤 Профіль</a>
                    <a href="#">💎 Підписка</a>
                    <a href="#">⚙️ Обліковий запис</a>
                    <a href="#">🌍 Мова</a>
                    <a href="{% url 'logout' %}">🚪 Вийти</a>
                </div>
            </div>
        </div>
    </header>

    <!-- Основний контент -->
    <main class="main-content">
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
