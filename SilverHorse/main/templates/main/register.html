<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Реєстрація</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'main/style.css' %}">
</head>
<body>
    <div class="form-container">
        <h2>Реєстрація</h2>

        {% if error %}
            <p style="color: red;">{{ error }}</p>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <label>Ім'я користувача:</label><br>
            <input type="text" name="username" placeholder="Логін" required><br>
            <label>Пароль:</label><br>
            <input type="password" name="password1" placeholder="Пароль" required><br>
            <label>Підтвердити пароль:</label><br>
            <input type="password" name="password2" placeholder="Підтвердити пароль" required><br>
            <button type="submit" class="btn">Зареєструватися</button>
        </form>

        <p style="margin-top: 15px;">
            Вже є акаунт?
            <a href="{% url 'login' %}" class="btn">Увійти</a>
        </p>
    </div>
</body>
</html>
