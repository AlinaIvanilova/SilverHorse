{% load static %}
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Відновлення пароля</title>
    <link rel="stylesheet" href="{% static 'main/style.css' %}">
</head>
<body>
    <div class="form-container">
        <h2>Відновлення пароля</h2>
        <p>Введіть свою електронну пошту, і ми надішлемо інструкцію для скидання пароля.</p>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn">Надіслати</button>
        </form>

        <p style="margin-top: 15px;">
            <a href="{% url 'login' %}" class="btn">Повернутися до входу</a>
        </p>
    </div>
</body>
</html>
