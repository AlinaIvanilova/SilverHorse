{% load static %}
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Введіть новий пароль</title>
    <link rel="stylesheet" href="{% static 'main/style.css' %}">
</head>
<body>
    <div class="form-container">
        <h2>Встановіть новий пароль</h2>

        {% if validlink %}
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn">Змінити пароль</button>
            </form>
        {% else %}
            <p>Посилання для скидання пароля недійсне. Можливо, воно вже використане. Будь ласка, спробуйте <a href="{% url 'password_reset' %}">скинути пароль ще раз</a>.</p>
        {% endif %}
    </div>
</body>
</html>
