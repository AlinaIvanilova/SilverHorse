<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Вхід</title>
    {% load static %}
    {% load socialaccount %}
    <link rel="stylesheet" href="{% static 'main/style.css' %}">
</head>
<body>
    <div class="form-container">
        <h2>Вхід</h2>

        {% if error %}
            <p style="color: red;">{{ error }}</p>
        {% endif %}

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <label>Ім'я користувача або email:</label><br>
            <input type="text" name="username" placeholder="Логін або email" required><br>
            <label>Пароль:</label><br>
            <input type="password" name="password" placeholder="Пароль" required><br>
            <button type="submit" class="btn">Увійти</button>
        </form>

        <p style="margin: 15px 0; text-align: center;">або</p>

        <a href="{% provider_login_url 'google' %}" class="btn-google">
            Увійти через Google
        </a>

        <p><a href="{% url 'password_reset' %}">Забули пароль?</a></p>

        <p style="margin-top: 15px;">
            Ще немає акаунта?
            <a href="{% url 'register' %}" class="btn">Зареєструватися</a>
        </p>
    </div>
</body>
</html>
